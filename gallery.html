<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=5">
    <title>Gallery | William Tran</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Shared Navigation -->
    <header>
        <div class="nav-container">
            <a href="index.html" class="logo-link">William Tran</a>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="gallery.html" class="active">Gallery</a></li>
                    <li><a href="Resume.pdf" target="_blank">Download My Resume</a></li>
                    <li><a href="recipes.html">Recipes</a></li>
                              </ul>
            </nav>
        </div>
    </header>

    <div class="container">
        <div class="section">
            <h2>Photographs</h2>
            <p>A collection of photos that I have taken. You can click to expand!</p>
            
            <!-- Gallery Grid -->
            <div class="gallery-grid" id="galleryGrid"></div>
        </div>
    </div>

    <!-- Lightbox Modal -->
    <div id="lightbox" class="lightbox">
        <!-- Close button -->
        <button class="lightbox-close" aria-label="Close lightbox">✕</button>
        
        <!-- Image container -->
        <div class="lightbox-container">
            <img class="lightbox-image" src="" alt="">
            
            <!-- Navigation buttons -->
            <button class="lightbox-nav lightbox-prev" aria-label="Previous image">
                <span class="nav-arrow">❮</span>
            </button>
            <button class="lightbox-nav lightbox-next" aria-label="Next image">
                <span class="nav-arrow">❯</span>
            </button>
        </div>
        
        <!-- Caption and counter -->
        <div class="lightbox-info">
            <div class="lightbox-counter">
                <span class="current-photo">1</span> / <span class="total-photos">6</span>
            </div>
            <div class="lightbox-caption"></div>
            <div class="lightbox-controls-hint">
                Swipe to navigate • ESC to close
            </div>
        </div>
    </div>

    <script>
        // ===== PHOTO DATA =====
        // Easy to add photos: just add a new object to this array!
        const photos = [
            {
                thumbnail: "githubphotos/WNT00410.JPEG",
                full: "githubphotos/WNT00410.JPEG",
                alt: "Kamo River in Kyoto",
                caption: "Kamo River in Kyoto"
            },
            {
                thumbnail: "githubphotos/WNT00456.JPEG",
                full: "githubphotos/WNT00456.JPEG",
                alt: "Kinkaku-ji in Kyoto",
                caption: "Kinkaku-ji in Kyoto"
            },
            {
                thumbnail: "githubphotos/WNT00649.JPEG",
                full: "githubphotos/WNT00649.JPEG",
                alt: "Kiyomizu-dera Temple in Kyoto",
                caption: "Kiyomizu-dera Temple in Kyoto - founded in 780"
            },

            {
                thumbnail: "githubphotos/WNT00665.JPEG",
                full: "githubphotos/WNT00665.JPEG",
                alt: "Kiyomizu-dera Temple in Kyoto",
                caption: "Another angle of Kiyomizu-dera Temple"
            },


            {
                thumbnail: "githubphotos/WNT00825 (1).JPEG",
                full: "githubphotos/WNT00825 (1).JPEG",
                alt: "Himeji Castle",
                caption: "The White Heron Castle. Made famous by James Bond in the film You Only Live Twice "
            },
            
                {
                thumbnail: "githubphotos/WNT01013.JPEG",
                full: "githubphotos/WNT01013.JPEG",
                alt: "Sign",
                caption: "Lost in translation"
            },
            {
                thumbnail: "githubphotos/WNT01240.JPEG",
                full: "githubphotos/WNT01240.JPEG",
                alt: "Sea Turtles at Churaumi Aquarium",
                caption: "Sea Turtles at Churaumi Aquarium in Okinawa"
            },
        
            {
                thumbnail: "githubphotos/WNT01244.JPEG",
                full: "githubphotos/WNT01244.JPEG",
                alt: "Sign",
                caption: "Famous crowd, famouser fish"
            }
        ];

        // ===== RENDER GALLERY =====
        const galleryGrid = document.getElementById('galleryGrid');
        photos.forEach((photo, index) => {
            const galleryItem = document.createElement('div');
            galleryItem.className = 'gallery-item';
            galleryItem.innerHTML = `
                <img src="${photo.thumbnail}" alt="${photo.alt}" class="gallery-image" data-index="${index}">
                <div class="gallery-caption">${photo.caption}</div>
            `;
            galleryGrid.appendChild(galleryItem);
        });

        // ===== LIGHTBOX FUNCTIONALITY =====
        const lightbox = document.getElementById('lightbox');
        const lightboxImage = document.querySelector('.lightbox-image');
        const lightboxCaption = document.querySelector('.lightbox-caption');
        const currentPhotoSpan = document.querySelector('.current-photo');
        const totalPhotosSpan = document.querySelector('.total-photos');
        let currentIndex = 0;

        // Touch gesture tracking
        let touchStartX = 0;
        let touchEndX = 0;
        let touchStartY = 0;
        let touchEndY = 0;
        const SWIPE_THRESHOLD = 50;

        // Update total photos count
        totalPhotosSpan.textContent = photos.length;

        // Open lightbox when clicking on an image
        document.addEventListener('click', (e) => {
            if (e.target.classList.contains('gallery-image')) {
                currentIndex = parseInt(e.target.dataset.index);
                openLightbox();
            }
        });

        function openLightbox() {
            const photo = photos[currentIndex];
            lightboxImage.src = photo.full;
            lightboxCaption.textContent = photo.caption;
            currentPhotoSpan.textContent = currentIndex + 1;
            
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
            lightbox.focus();
        }

        function closeLightbox() {
            lightbox.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        function showImage(index) {
            if (index >= photos.length) currentIndex = 0;
            if (index < 0) currentIndex = photos.length - 1;
            
            openLightbox();
        }

        // Close button
        document.querySelector('.lightbox-close').addEventListener('click', closeLightbox);

        // Next/Prev buttons
        document.querySelector('.lightbox-next').addEventListener('click', (e) => {
            e.stopPropagation();
            currentIndex++;
            showImage(currentIndex);
        });

        document.querySelector('.lightbox-prev').addEventListener('click', (e) => {
            e.stopPropagation();
            currentIndex--;
            showImage(currentIndex);
        });

        // Close on background click
        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) closeLightbox();
        });

        // Prevent closing when clicking on content
        document.querySelector('.lightbox-container').addEventListener('click', (e) => {
            e.stopPropagation();
        });

        document.querySelector('.lightbox-info').addEventListener('click', (e) => {
            e.stopPropagation();
        });

        // ===== TOUCH SWIPE GESTURES =====
        lightboxImage.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].clientX;
            touchStartY = e.changedTouches[0].clientY;
        }, { passive: true });

        lightboxImage.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].clientX;
            touchEndY = e.changedTouches[0].clientY;
            
            // Calculate if swipe is primarily horizontal
            const horizontalDistance = Math.abs(touchEndX - touchStartX);
            const verticalDistance = Math.abs(touchEndY - touchStartY);
            
            // Only trigger navigation if horizontal swipe is significant
            if (horizontalDistance > SWIPE_THRESHOLD && horizontalDistance > verticalDistance) {
                if (touchEndX < touchStartX) {
                    // Swiped left - go to next image
                    currentIndex++;
                    showImage(currentIndex);
                } else if (touchEndX > touchStartX) {
                    // Swiped right - go to previous image
                    currentIndex--;
                    showImage(currentIndex);
                }
            }
        }, { passive: true });

        // ===== KEYBOARD NAVIGATION =====
        document.addEventListener('keydown', (e) => {
            if (!lightbox.classList.contains('active')) return;
            
            if (e.key === 'ArrowRight') {
                currentIndex++;
                showImage(currentIndex);
            }
            if (e.key === 'ArrowLeft') {
                currentIndex--;
                showImage(currentIndex);
            }
            if (e.key === 'Escape') closeLightbox();
        });

        // ===== PREVENT DOUBLE-TAP ZOOM ON BUTTONS =====
        let lastTap = 0;
        ['lightbox-nav', 'lightbox-close'].forEach(className => {
            document.querySelectorAll('.' + className).forEach(button => {
                button.addEventListener('touchstart', (e) => {
                    const now = Date.now();
                    if (now - lastTap < 300) {
                        e.preventDefault();
                    }
                    lastTap = now;
                }, { passive: false });
            });
        });
    </script>

</body>
</html>
